<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRT wash — OVRT</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="site-shell">
        <header class="tool-header">
            <a href="index.html" class="back-link">← Back to OVRT</a>
            <span class="tool-title">CRT wash</span>
        </header>
        <div class="app" aria-label="CRT wash">
            <div id="crt-canvas"></div>
            <aside class="control-panel">
                <header class="panel-header">
                    <h2>Controls</h2>
                </header>
                <div class="panel-body">
                    <section class="control-section">
                        <h3>Field</h3>
                        <div class="control-row">
                            <label for="crt-layers">Layers</label>
                            <input type="range" id="crt-layers" min="10" max="200" value="100" step="5">
                            <span class="param-value" id="val-crt-layers">100</span>
                        </div>
                        <div class="control-row">
                            <label for="crt-block">Block size</label>
                            <input type="range" id="crt-block" min="6" max="40" value="20" step="1">
                            <span class="param-value" id="val-crt-block">20</span>
                        </div>
                    </section>
                    <section class="control-section">
                        <h3>Motion</h3>
                        <div class="control-row">
                            <label for="crt-zspeed">Z motion</label>
                            <input type="range" id="crt-zspeed" min="1" max="20" value="5" step="1">
                            <span class="param-value" id="val-crt-zspeed">5</span>
                        </div>
                        <div class="control-row">
                            <label for="crt-xspeed">X/Y motion</label>
                            <input type="range" id="crt-xspeed" min="1" max="10" value="5" step="1">
                            <span class="param-value" id="val-crt-xspeed">5</span>
                        </div>
                    </section>
                    <section class="control-section">
                        <h3>Style</h3>
                        <div class="control-row color-row">
                            <label for="crt-bg">Background</label>
                            <input type="color" id="crt-bg" value="#000000">
                        </div>
                        <div class="control-row">
                            <label for="crt-fade">Trail fade</label>
                            <input type="range" id="crt-fade" min="1" max="20" value="5" step="1">
                            <span class="param-value" id="val-crt-fade">0.05</span>
                        </div>
                    </section>
                </div>
            </aside>
        </div>
    </div>
    <script src="page-transition.js"></script>
    <script src="crt.js"></script>
</body>
</html>

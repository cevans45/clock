<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape orbits — OVRT</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="site-shell">
        <header class="tool-header">
            <a href="index.html" class="back-link">← Back to OVRT</a>
            <span class="tool-title">Shape orbits</span>
        </header>
        <div class="app" aria-label="Shape orbits">
            <div id="orbit-canvas"></div>
            <aside class="control-panel">
                <header class="panel-header">
                    <h2>Controls</h2>
                </header>
                <div class="panel-body">
                    <section class="control-section">
                        <h3>Layout</h3>
                        <div class="control-row">
                            <label for="orbit-count">Shapes</label>
                            <input type="range" id="orbit-count" min="1" max="80" value="24" step="1">
                            <span class="param-value" id="value-orbit-count">24</span>
                        </div>
                        <div class="control-row">
                            <label for="orbit-scale">Canvas scale</label>
                            <input type="range" id="orbit-scale" min="50" max="100" value="90" step="5">
                            <span class="param-value" id="value-orbit-scale">90%</span>
                        </div>
                        <div class="control-row">
                            <label for="orbit-mirror">Mirrors</label>
                            <input type="range" id="orbit-mirror" min="1" max="4" value="1" step="1">
                            <span class="param-value" id="value-orbit-mirror">1</span>
                        </div>
                    </section>
                    <section class="control-section">
                        <h3>Motion</h3>
                        <div class="control-row">
                            <label for="orbit-speed">Speed</label>
                            <input type="range" id="orbit-speed" min="5" max="200" value="60" step="5">
                            <span class="param-value" id="value-orbit-speed">60</span>
                        </div>
                        <div class="control-row">
                            <label for="orbit-mode">Mode</label>
                            <select id="orbit-mode" class="select-input">
                                <option value="horizontal">Horizontal</option>
                                <option value="vertical">Vertical</option>
                                <option value="diagonal">Diagonal</option>
                                <option value="orbit" selected>Orbit</option>
                                <option value="mixed">Mixed</option>
                            </select>
                        </div>
                    </section>
                    <section class="control-section">
                        <h3>Shapes & color</h3>
                        <div class="control-row">
                            <label for="orbit-shape">Shape</label>
                            <select id="orbit-shape" class="select-input">
                                <option value="circle" selected>Circles</option>
                                <option value="square">Squares</option>
                                <option value="triangle">Triangles</option>
                                <option value="mixed">Mixed</option>
                            </select>
                        </div>
                        <div class="control-row">
                            <label for="orbit-size">Size</label>
                            <input type="range" id="orbit-size" min="4" max="40" value="20" step="2">
                            <span class="param-value" id="value-orbit-size">20</span>
                        </div>
                        <div class="control-row color-row">
                            <label for="orbit-bg">Background</label>
                            <input type="color" id="orbit-bg" value="#f6f6f4">
                        </div>
                        <div class="control-row color-row">
                            <label for="orbit-color">Shape</label>
                            <input type="color" id="orbit-color" value="#111111">
                        </div>
                        <div class="control-row">
                            <label>Palette</label>
                            <button type="button" id="btn-orbit-random-colors" class="panel-button">Random colors</button>
                        </div>
                    </section>
                </div>
            </aside>
        </div>
    </div>
    <script src="page-transition.js"></script>
    <script src="ring.js"></script>
</body>
</html>
